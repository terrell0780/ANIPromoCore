<!DOCTYPE html>
<html>
<head>
<title>ANIPromoCore‚ĄĘ</title>
</head>

<body>

<h1>ANIPromoCore‚ĄĘ</h1>
<p>Autonomous Promotion Core</p>

<hr>

<p>Recommended Tools:</p>

<ul id="tools">

<li data-id="tool1">
<a href="go/tool1.html">Tool 1</a>
</li>

<li data-id="tool2">
<a href="go/tool2.html">Tool 2</a>
</li>

</ul>

<script>

async function autoRank() {

try {

const response =
await fetch("https://anipromocore.terrell0780.workers.dev/?getClicks=true");

const data = await response.json();

const list =
document.getElementById("tools");

const items =
Array.from(list.children);

items.sort((a,b) =>
(data[b.dataset.id] || 0) -
(data[a.dataset.id] || 0)
);

list.innerHTML = "";

items.forEach(i =>
list.appendChild(i)
);

}

catch(e){
console.log("ranking error",e);
}

}

autoRank();

</script>

</body>
</html>
